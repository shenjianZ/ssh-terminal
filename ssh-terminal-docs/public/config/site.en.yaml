# Website Configuration
site:
    title: "SSH Terminal"
    description: "Cross-platform desktop SSH terminal management tool with AI assistant, SFTP file management, and cloud sync"
    logo:
        light: "/images/favicon.svg"
        dark: "/images/favicon-dark.svg"
    author: "shenjianZ"

# Navigation Bar Configuration
navbar:
    showLogo: true
    showTitle: true
    showLanguageSwitcher: true
    items:
        - title: "Home"
          link: "/"
          active: true
        - title: "Docs"
          link: "/docs"
    actions:
        - type: "github"
          link: "https://github.com/shenjianZ/ssh-terminal"
          enabled: true

# Sidebar Navigation Configuration
sidebar:
    enabled: true
    collections:
        docs:
            sections:
                - title: "Getting Started"
                  path: "/docs/start"
                  children:
                      - title: "Introduction"
                        path: "/docs/start/introduction"
                      - title: "Features"
                        path: "/docs/start/features"
                      - title: "Installation"
                        path: "/docs/start/installation"
                      - title: "Quick Start"
                        path: "/docs/start/quick-start"
                - title: "User Guide"
                  path: "/docs/guide"
                  children:
                      - title: "Basics"
                        path: "/docs/guide/basics"
                      - title: "SSH Connection"
                        path: "/docs/guide/ssh-connection"
                      - title: "AI Assistant"
                        path: "/docs/guide/ai-assistant"
                      - title: "SFTP File Management"
                        path: "/docs/guide/sftp"
                      - title: "Cloud Sync"
                        path: "/docs/guide/cloud-sync"
                - title: "Configuration"
                  path: "/docs/config"
                  children:
                      - title: "Environment Variables"
                        path: "/docs/config/env"
                      - title: "Deployment"
                        path: "/docs/config/deployment"
                - title: "Contributing"
                  path: "/docs/contributing"
                  children:
                      - title: "Setup"
                        path: "/docs/contributing/setup"
                      - title: "Code Style"
                        path: "/docs/contributing/code-style"
                      - title: "Testing"
                        path: "/docs/contributing/testing"
                      - title: "PR Flow"
                        path: "/docs/contributing/pr-flow"
                - title: "Support"
                  path: "/docs/support"
                  children:
                      - title: "FAQ"
                        path: "/docs/support/faq"
                      - title: "Troubleshooting"
                        path: "/docs/support/troubleshooting"
                      - title: "Ecosystem"
                        path: "/docs/support/ecosystem"
                - title: "Meta"
                  path: "/docs/meta"
                  children:
                      - title: "Changelog"
                        path: "/docs/meta/changelog"
                      - title: "License"
                        path: "/docs/meta/license"

# Theme Configuration
theme:
    # Default theme mode: 'light' | 'dark' | 'auto'
    # light: Force light mode
    # dark: Force dark mode
    # auto: Follow system preference (default)
    defaultMode: "auto"

    # Allow users to toggle theme (show theme toggle button)
    allowToggle: true

# Table of Contents Configuration
toc:
    # Maximum heading level to display in TOC (1-6)
    maxLevel: 3

    # Enable table of contents
    enabled: true

    # TOC title
    title: "On This Page"

# Footer Configuration
footer:
    enabled: true
    copyright: "© 2026 SSH Terminal. All rights reserved."
    repository:
        url: "https://github.com/shenjianZ/ssh-terminal"
        branch: "master"
    lastUpdated: "2026-03-03"
    version: "v1.2.1"
    groups:
        - title: "Community"
          items:
              - title: "Discussions"
                link: "https://github.com/shenjianZ/ssh-terminal/discussions"
                external: true
              - title: "Issues"
                link: "https://github.com/shenjianZ/ssh-terminal/issues"
                external: true
              - title: "Contributing"
                link: "https://github.com/shenjianZ/ssh-terminal/blob/master/CONTRIBUTING.md"
                external: true
              - title: "Releases"
                link: "https://github.com/shenjianZ/ssh-terminal/releases"
                external: true
        - title: "Help & Support"
          items:
              - title: "Quick Start"
                link: "/docs/start/quick-start"
              - title: "Source Code"
                link: "https://github.com/shenjianZ/ssh-terminal"
                external: true
              - title: "License"
                link: "https://github.com/shenjianZ/ssh-terminal/blob/master/LICENSE"
                external: true
              - title: "Back to Top"
                link: "#"
                action: "scrollTop"
    links:
        - title: "Docs"
          link: "/docs"
        - title: "GitHub"
          link: "https://github.com/shenjianZ/ssh-terminal"
          external: true
        - title: "License"
          link: "/docs/meta/license"
    social:
        - name: "email"
          url: "mailto:contact@example.com"
          icon: "mail"
        - name: "github"
          link: "https://github.com/shenjianZ/React-docs-ui"
          icon: "github"
